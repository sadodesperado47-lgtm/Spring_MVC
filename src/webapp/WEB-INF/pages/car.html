<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>List_Cars</title>
    <style>
        table {
            border-collapse: collapse;
        }
        th, td {
            width: 50px;
            height: 25px;
            border: 1px solid black;
            padding: 2px;
            margin: 0;
            font-size: 7px;
            text-align: center;
        }
        h1 {
            font-size: 16px; /* размер в два раза меньше стандартного */
        }
    </style>
</head>
<body>
<h1>CARS</h1>
<table>
    <tr>
        <th>Model</th>
        <th>Year</th>
        <th>Max Speed</th>
    </tr>
    <tr th:each="car : ${cars}">
        <td th:text="${car.model}"></td>
        <td th:text="${car.year}"></td>
        <td th:text="${car.maxSpeed}"></td>
    </tr>
</table>
</body>
</html>
